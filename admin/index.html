<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>上海城中物志 · 资产控制台</title>
  <link rel="stylesheet" href="styles.css?v=20260714-bulk-data">
</head>
<body>
<div id="login" class="login">
  <form id="loginForm">
    <div class="eyebrow">SHANGHAI INDEX</div><h1>资产控制台</h1>
    <input id="email" type="email" placeholder="管理员邮箱" required>
    <input id="password" type="password" placeholder="密码" required>
    <button>登录</button><p id="loginMsg"></p>
  </form>
</div>
<div id="app" hidden>
  <header>
    <div><b>上海城中物志</b><span>资产控制台</span></div>
    <div class="header-actions"><a class="site-link" href="../" target="_blank" rel="noopener">查看展示网站</a><button id="signOut">退出</button></div>
  </header>
  <nav class="view-tabs" aria-label="控制台视图">
    <button class="active" data-view="detail">单条编辑</button>
    <button data-view="sheet">表格全览</button>
    <button data-view="regions">区域管理</button>
    <button data-view="venues">地点库</button>
  </nav>

  <main id="detailView" class="view-panel detail-layout">
    <aside>
      <div class="filters"><input id="search" placeholder="搜索展览、地点、ID"><select id="regionFilter"><option value="">全部区域</option></select><button id="newBtn">＋ 新增资产</button></div>
      <div id="list"></div>
    </aside>
    <section class="editor"><form id="assetForm"><input type="hidden" id="rowId">
      <div class="hero"><div><label>系统 ID<input id="system_id" required placeholder="art-013"></label><label>发布状态<select id="status"><option value="draft">草稿</option><option value="published">已发布</option></select></label></div><div class="preview"><img id="previewImg" alt=""><span>图片预览</span></div></div>
      <div class="grid">
        <label>所属区域<select id="region"></select></label>
        <label>展览权重<select id="exhibition_weight"><option value="">默认</option><option value="A">A · 最重要</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></label>
        <label>排序<input id="sort_order" type="number" value="0"></label>
        <label class="wide">展览名称<input id="exhibition_title" required></label>
        <div class="wide venue-picker-block">
          <label>展览地点
            <div class="venue-picker"><input id="venue" list="venueOptions" autocomplete="off" required placeholder="输入名称查找地点"><button type="button" id="quickAddVenue">＋ 新增地点</button></div>
            <input type="hidden" id="venue_id"><datalist id="venueOptions"></datalist>
          </label>
          <div id="quickVenuePanel" class="quick-venue" hidden>
            <label>地点名称<input id="quickVenueName"></label><label>经度<input id="quickVenueLng" type="number" step="any"></label><label>纬度<input id="quickVenueLat" type="number" step="any"></label>
            <button type="button" id="saveQuickVenue">保存并选择</button><button type="button" id="cancelQuickVenue">取消</button>
          </div>
        </div>
        <label class="wide">展品名称<input id="object_name" required></label>
        <label>开始日期<input id="start_date" type="date" required></label><label>结束日期<input id="end_date" type="date" required></label>
        <label class="wide coordinate-source">坐标来源<select id="use_venue_coordinates"><option value="true">自动引用地点库经纬度</option><option value="false">不引用，手动填写本展览坐标</option></select><small id="venueCoordinateHint"></small></label>
        <label>经度<input id="longitude" type="number" step="any"></label><label>纬度<input id="latitude" type="number" step="any"></label>
        <label class="wide">图片地址<input id="image_url"></label><label class="wide upload">上传／替换图片<input id="imageFile" type="file" accept="image/*"></label>
        <label class="wide">描述<textarea id="description" rows="4"></textarea></label>
      </div>
      <div class="actions"><button type="button" id="deleteBtn" class="danger">删除</button><button type="submit" class="save">保存资产</button></div><p id="formMsg"></p>
    </form></section>
  </main>

  <main id="sheetView" class="view-panel sheet-panel" hidden>
    <div class="sheet-toolbar"><div><strong>全部展品</strong><span id="sheetCount"></span></div><div class="toolbar-actions"><button id="addSheetRow">＋ 新增一行</button><button id="bulkAddAssets">批量新增</button><button id="importAssets">导入数据</button><button id="exportSelectedAssets">导出选中</button><button id="exportAllAssets">导出全部</button><button id="saveAllRows" class="primary">保存全部修改</button></div></div>
    <input id="assetImportFile" type="file" accept=".xlsx,.xls,.csv,.tsv,.txt" hidden>
    <div class="sheet-wrap"><table id="assetTable"><thead><tr>
      <th class="select-col"><input id="selectAllAssets" type="checkbox" aria-label="全选"></th><th class="sticky-col">操作</th><th>系统 ID</th><th>区域</th><th>权重</th><th>展览名称</th><th>地点</th><th>坐标来源</th><th>展品名称</th><th>开始日期</th><th>结束日期</th><th>经度</th><th>纬度</th><th>图片地址</th><th>状态</th><th>排序</th><th>描述</th>
    </tr></thead><tbody></tbody></table></div><p id="sheetMsg"></p>
  </main>

  <main id="regionsView" class="view-panel regions-panel" hidden>
    <div class="regions-head"><div><h2>区域管理</h2><p>区域切换只读取中心经纬度，所有区域共用同一地图缩放尺度。</p></div><button id="addRegion">＋ 新增区域</button></div>
    <div id="regionsList" class="regions-list"></div><p id="regionMsg"></p>
  </main>

  <main id="venuesView" class="view-panel venues-panel" hidden>
    <div class="venues-head"><div><h2>地点库</h2><p>统一管理地点名称与经纬度，并查看每个地点下关联的全部展览。</p></div><div class="toolbar-actions"><button id="addVenue">＋ 新增地点</button><button id="bulkAddVenues">批量新增</button><button id="importVenues">导入数据</button><button id="exportAllVenues">导出全部</button></div></div>
    <input id="venueImportFile" type="file" accept=".xlsx,.xls,.csv,.tsv,.txt" hidden>
    <div class="venues-layout"><div id="venuesList" class="venues-list"></div><aside id="venueExhibitions" class="venue-exhibitions"><div class="empty-state">选择一个地点查看关联展览</div></aside></div><p id="venueMsg"></p>
  </main>
</div>
<dialog id="bulkDialog" class="data-dialog">
  <form method="dialog" class="dialog-card" id="bulkForm">
    <header><div><h2 id="bulkTitle">批量新增</h2><p id="bulkHint"></p></div><button value="cancel" class="dialog-close" aria-label="关闭">×</button></header>
    <textarea id="bulkText" placeholder="请粘贴带表头的制表符表格 TSV" spellcheck="false"></textarea>
    <pre id="bulkExample" class="format-example"></pre>
    <p id="bulkMsg" class="dialog-msg"></p>
    <footer><button value="cancel">取消</button><button type="button" id="confirmBulk" class="primary">新增</button></footer>
  </form>
</dialog>
<dialog id="importDialog" class="data-dialog">
  <form method="dialog" class="dialog-card">
    <header><div><h2>导入数据</h2><p id="importFileName"></p></div><button value="cancel" class="dialog-close" aria-label="关闭">×</button></header>
    <div id="importSummary" class="import-summary"></div>
    <div id="importErrors" class="import-errors"></div>
    <footer><button value="cancel">取消</button><button type="button" id="confirmImport" class="primary">确认更新</button></footer>
  </form>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><script src="config.js"></script><script src="app.js?v=20260714-bulk-data"></script>
</body></html>
